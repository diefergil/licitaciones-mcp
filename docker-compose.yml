services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres-bm25/Dockerfile
      args:
        PG_TEXTSEARCH_VERSION: v1.2.0
    image: licitaciones-mcp-postgres:pg18-bm25
    command: ["postgres", "-c", "shared_preload_libraries=pg_textsearch"]
    environment:
      POSTGRES_DB: licitaciones
      POSTGRES_USER: licitaciones
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-deploy}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licitaciones -d licitaciones"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://licitaciones:${POSTGRES_PASSWORD:-change-me-before-deploy}@postgres:5432/licitaciones
      LICITACIONES_SEARCH_BACKEND: ${LICITACIONES_SEARCH_BACKEND:-bm25}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["licitaciones-mcp", "init-db"]

  mcp:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://licitaciones:${POSTGRES_PASSWORD:-change-me-before-deploy}@postgres:5432/licitaciones
      LICITACIONES_SEARCH_BACKEND: ${LICITACIONES_SEARCH_BACKEND:-bm25}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["licitaciones-mcp", "serve-mcp", "--host", "0.0.0.0", "--port", "8080"]

  scheduler:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://licitaciones:${POSTGRES_PASSWORD:-change-me-before-deploy}@postgres:5432/licitaciones
      LICITACIONES_SEARCH_BACKEND: ${LICITACIONES_SEARCH_BACKEND:-bm25}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["licitaciones-mcp", "scheduler", "run"]

volumes:
  postgres-data:

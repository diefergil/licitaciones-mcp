services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: licitaciones
      POSTGRES_USER: licitaciones
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-deploy}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licitaciones -d licitaciones"]
      interval: 5s
      timeout: 5s
      retries: 20

  mcp:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://licitaciones:${POSTGRES_PASSWORD:-change-me-before-deploy}@postgres:5432/licitaciones
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "licitaciones-mcp init-db && licitaciones-mcp serve-mcp --host 0.0.0.0 --port 8080"]

  scheduler:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://licitaciones:${POSTGRES_PASSWORD:-change-me-before-deploy}@postgres:5432/licitaciones
    depends_on:
      postgres:
        condition: service_healthy
      mcp:
        condition: service_started
    command: ["licitaciones-mcp", "scheduler", "run"]

volumes:
  postgres-data:
